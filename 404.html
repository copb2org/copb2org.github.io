<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page not found — COPB2.org</title>
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#12807e">

  <!-- Resolve relative links/styles against the real site root, even when GitHub
       Pages serves this 404 for a mistyped deep URL (e.g. /repo/x/y/z). -->
  <script>
    (function () {
      var seg = location.pathname.split('/').filter(Boolean);
      var base = '/';
      if (/\.github\.io$/i.test(location.hostname) && seg.length && seg[0].indexOf('.') === -1) {
        base = '/' + seg[0] + '/';
      }
      document.write('<base href="' + base + '">');
    })();
  </script>

  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">

  <!-- Self-contained styles so this page is never blank, even if the main
       stylesheet can't be found. The site stylesheet still loads for fonts. -->
  <style>
    :root { --teal:#12807e; --teal-dark:#0a3d3c; --ink:#15252b; --muted:#3a4d54; --bg:#f7fafa; --line:#dde6e8; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:"Segoe UI", system-ui, -apple-system, sans-serif; color:var(--ink); background:var(--bg); line-height:1.6; }
    .wrap { max-width:620px; margin:0 auto; padding:clamp(3rem,8vw,6rem) 1.25rem; text-align:center; }
    .brandline { display:inline-flex; align-items:center; gap:.55rem; font-weight:700; font-size:1.2rem; text-decoration:none; color:var(--ink); margin-bottom:2.5rem; }
    .brandline svg { width:36px; height:36px; }
    .eyebrow { display:inline-block; font-size:.78rem; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--teal); margin-bottom:.5rem; }
    h1 { font-size:clamp(1.8rem,1.3rem+2vw,2.6rem); margin:.2rem 0 .6rem; line-height:1.15; }
    p { color:var(--muted); margin:.4rem 0; }
    .btns { display:flex; gap:.7rem; justify-content:center; flex-wrap:wrap; margin-top:1.8rem; }
    .b { display:inline-block; padding:.85rem 1.5rem; border-radius:999px; text-decoration:none; font-weight:600; border:2px solid transparent; }
    .b-primary { background:var(--teal); color:#fff; }
    .b-primary:hover { background:var(--teal-dark); }
    .b-ghost { border-color:var(--line); color:var(--teal); }
    .b-ghost:hover { background:#eef5f5; }
    .small { margin-top:1.8rem; font-size:.95rem; }
    .small a { color:var(--teal); }
    .foot { margin-top:3rem; font-size:.85rem; color:#5d6f76; }
    .foot a { color:#5d6f76; }
  </style>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <main class="wrap">
    <a class="brandline" href="index.html" aria-label="COPB2.org home">
      <img src="assets/favicon.png" width="36" height="36" alt="" style="border-radius:8px">
      <span>COPB2<b style="color:#0e6e6c">.org</b></span>
    </a>

    <p class="eyebrow">Error 404</p>
    <h1>We Couldn’t Find That Page</h1>
    <p>The link may be broken or the page may have moved. Let’s get you back on track.
      You’re not lost, and you’re not alone.</p>

    <div class="btns">
      <a class="b b-primary" href="index.html">Go to homepage</a>
      <a class="b b-ghost" href="copb2.html">COPB2</a>
    </div>


    <p class="foot">© <span data-year>2026</span> COPB2.org. A non-profit information resource. ·
      <a href="index.html">Home</a> · <a href="copb2.html">COPB2</a></p>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
